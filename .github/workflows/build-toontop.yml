name: Build ToonTop Debug Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - name: Build ONLY ToonTop Debug
        run: ./gradlew :src:en:toontop:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ToonTop-APK
          path: src/en/toontop/build/outputs/apk/debug/*.apk
